<!DOCTYPE html>
<html>
	<head>
		<title>Fancify Shamcify</title>

		<!-- link to your script file here -->
		<script src="fancifymytext.js"></script>
	</head>

	<body>
		<h1>Fancify my Text</h1>
		
		<fieldset>
			<legend>Text</legend>
			<textarea id="textInput" rows ="4" cols="30"></textarea>
		</fieldset>

		<br>

		<!-- Your UI controls go here -->
		<fieldset>
			<legend>Fancify</legend>

			<button onclick="Bigger()">Bigger!</button> <!-- Button that makes the inserted text 24 pt font-->
			<br><br>

			<input type="radio" id="boring" name="style" onchange="applyStyle()"> <!-- Resets the font size and color back to black -->
			<label for="boring">BoringBetty</label> 

			<input type="radio" id="fancy" name="style" onchange="applyStyle()"> <!-- Changes the text color blue as well as underlines and bolds it -->
			<label for="fancy">FancyShmancy</label> 

			<br><br>

			<button onclick="Moo()">Moo</button> <!-- Uppercases the text while adding the word moo to the end of it -->
		</fieldset>
	</body>
</html>
